<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #020111, #000);
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();

// ⭐ FONDO
const bgStars = Array.from({length: 35}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  size: Math.random() * 1.2,
  speed: Math.random() * 0.15 + 0.03
}));

function drawBackground() {
  for (let s of bgStars) {
    s.y += s.speed;
    if (s.y > window.innerHeight) s.y = 0;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

// ❤️ CORAZÓN
function createHeartPoints() {
  const pts = [];
  for (let t = 0; t < Math.PI * 2; t += 0.02) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    pts.push({x, y});
  }
  return pts;
}

// 🎂 PASTEL CON VELAS
function createCakePoints() {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  off.width = 500;
  off.height = 500;

  const cx = 250;
  const cy = 250;

  octx.fillStyle = "white";

  // Base pastel
  octx.fillRect(cx - 120, cy + 20, 240, 120);
  octx.fillRect(cx - 90, cy - 60, 180, 90);

  // Decoración
  for (let i = -90; i <= 90; i += 30) {
    octx.beginPath();
    octx.arc(cx + i, cy + 20, 8, 0, Math.PI);
    octx.fill();
  }

  // 🕯️ Velas
  const candlePositions = [-60, 0, 60];
  candlePositions.forEach(offset => {
    octx.fillRect(cx + offset - 4, cy - 110, 8, 40);

    // flama base
    octx.beginPath();
    octx.arc(cx + offset, cy - 120, 6, 0, Math.PI * 2);
    octx.fill();
  });

  const img = octx.getImageData(0, 0, 500, 500);
  const pts = [];

  for (let y = 0; y < 500; y += 3) {
    for (let x = 0; x < 500; x += 3) {
      const i = (y * 500 + x) * 4;
      if (img.data[i + 3] > 120) pts.push({x,y});
    }
  }

  return { pts, w: 500, h: 500 };
}

const heart = createHeartPoints();
const cake = createCakePoints();

// 📐 MAP
function map(p, shape) {
  if (shape.w) {
    const scale = Math.min(window.innerWidth/shape.w, window.innerHeight/shape.h) * 0.6;
    return {
      x: (p.x - shape.w/2)*scale + window.innerWidth/2,
      y: (p.y - shape.h/2)*scale + window.innerHeight/2 - 50
    };
  } else {
    const scale = Math.min(window.innerWidth, window.innerHeight) * 0.035;
    return {
      x: p.x*scale + window.innerWidth/2,
      y: -p.y*scale + window.innerHeight/2
    };
  }
}

// ⭐ ESTRELLAS
let stars = [];

function createStars(shapeObj) {
  stars = [];
  const pts = shapeObj.pts || shapeObj;

  for (let i = 0; i < pts.length; i += 3) {
    const m = map(pts[i], shapeObj);
    stars.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      tx: m.x,
      ty: m.y,
      size: Math.random()*1.5+0.5
    });
  }
}

createStars({pts: heart});

// 🎬 ESTADOS
let phase = "forming";
let textOpacity = 0;

// ⭐ DIBUJO + EFECTO FLAMA
function drawStars() {
  for (let s of stars) {

    // movimiento
    s.x += (s.tx - s.x)*0.04;
    s.y += (s.ty - s.y)*0.04;

    // 🔥 efecto parpadeo
    let flicker = Math.random() * 0.5 + 0.7;
    ctx.globalAlpha = flicker;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.globalAlpha = 1;
  }
}

// 💬 TEXTO
function drawText() {
  ctx.save();
  ctx.globalAlpha = textOpacity;
  ctx.textAlign = "center";
  ctx.fillStyle = "white";

  const baseY = window.innerHeight - 90;

  ctx.font = "bold 38px Arial";
  ctx.fillText("Feliz cumpleaños Nao!", window.innerWidth/2, baseY - 35);

  ctx.font = "22px Arial";
  ctx.fillText("Te desean Donovan, Valeria y Derek :D", window.innerWidth/2, baseY);

  ctx.restore();
}

// 🎥 LOOP
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();
  drawStars();

  if (phase === "text") {
    if (textOpacity < 1) textOpacity += 0.02;
    drawText();
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

// ⏱️ TIMELINE
setTimeout(()=>{
  createStars(cake);
}, 4000);

setTimeout(()=>{
  phase="text";
}, 7000);

animate();

window.addEventListener("resize", ()=>{
  resizeCanvas();
  createStars(cake);
});
</script>
</body>
</html>
