<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #020111, #000);
  font-family: Arial, sans-serif;
}
canvas { display: block; }
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();

// ===== FONDO =====
const bgStars = Array.from({ length: 150 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  size: Math.random() * 1.2,
  speed: Math.random() * 0.15 + 0.03
}));

function drawBackground() {
  bgStars.forEach(s => {
    s.y += s.speed;
    if (s.y > window.innerHeight) s.y = 0;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });
}

// ❤️ CORAZÓN
function createHeartPoints() {
  const pts = [];
  for (let t = 0; t < Math.PI * 2; t += 0.02) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    pts.push({ x: x * 0.7, y: y * 0.7 });
  }
  return pts;
}

// ⭐ ESTRELLA CON TRAZOS
function createStarShape() {
  const pts = [];
  const spikes = 5;
  const outer = 15;
  const inner = 7;

  let vertices = [];

  for (let i = 0; i < spikes * 2; i++) {
    let r = (i % 2 === 0) ? outer : inner;
    let angle = (i * Math.PI) / spikes;

    vertices.push({
      x: Math.cos(angle) * r,
      y: Math.sin(angle) * r
    });
  }

  for (let i = 0; i < vertices.length; i++) {
    let a = vertices[i];
    let b = vertices[(i + 1) % vertices.length];

    for (let t = 0; t < 1; t += 0.05) {
      pts.push({
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      });
    }
  }

  return pts;
}

// 🎂 PASTEL CON GLOBOS (RESTAURADO)
function createCakePoints() {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  off.width = 900;
  off.height = 900;

  const cx = off.width / 2;
  const cy = off.height / 2;

  octx.fillStyle = "white";
  octx.strokeStyle = "white";
  octx.lineWidth = 6;

  // base
  octx.beginPath();
  octx.roundRect(cx - 140, cy + 20, 280, 120, 20);
  octx.fill();

  // capa
  octx.beginPath();
  octx.roundRect(cx - 110, cy - 60, 220, 90, 20);
  octx.fill();

  // detalle
  for (let i = -100; i <= 100; i += 20) {
    octx.beginPath();
    octx.arc(cx + i, cy + 20, 10, 0, Math.PI);
    octx.fill();
  }

  // velas
  for (let i = -60; i <= 60; i += 60) {
    octx.fillRect(cx + i - 5, cy - 120, 10, 50);

    octx.beginPath();
    octx.ellipse(cx + i, cy - 135, 6, 10, 0, 0, Math.PI * 2);
    octx.fill();
  }

  // 🎈 GLOBOS ORIGINALES
  function drawBalloon(x, y) {
    octx.beginPath();
    octx.ellipse(x, y, 35, 45, 0, 0, Math.PI * 2);
    octx.fill();

    // nudo
    octx.beginPath();
    octx.moveTo(x - 5, y + 40);
    octx.lineTo(x + 5, y + 40);
    octx.lineTo(x, y + 50);
    octx.closePath();
    octx.fill();

    // cuerda
    octx.beginPath();
    octx.moveTo(x, y + 50);
    octx.lineTo(x, y + 110);
    octx.stroke();
  }

  drawBalloon(cx - 260, cy - 120);
  drawBalloon(cx - 200, cy - 170);
  drawBalloon(cx + 260, cy - 120);
  drawBalloon(cx + 200, cy - 170);

  const img = octx.getImageData(0, 0, off.width, off.height);
  const pts = [];

  for (let y = 0; y < off.height; y += 2) {
    for (let x = 0; x < off.width; x += 2) {
      const i = (y * off.width + x) * 4;
      if (img.data[i + 3] > 120) pts.push({ x, y });
    }
  }

  return { pts, w: off.width, h: off.height };
}

// MAP
function map(p, shape) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  if (shape.w) {
    const scale = Math.min(window.innerWidth/shape.w, window.innerHeight/shape.h) * 0.75;
    return {
      x: (p.x - shape.w/2) * scale + cx,
      y: (p.y - shape.h/2) * scale + cy
    };
  } else {
    const scale = Math.min(window.innerWidth, window.innerHeight) * 0.03;
    return {
      x: p.x * scale + cx,
      y: -p.y * scale + cy
    };
  }
}

// ⭐ ESTRELLAS
let stars = [];

function createStars(shape) {
  stars = [];
  const pts = shape.pts || shape;

  for (let i = 0; i < pts.length; i += 2) {
    const m = map(pts[i], shape);

    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      tx: m.x,
      ty: m.y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      size: Math.random() * 1.5 + 0.5
    });
  }
}

// ===== FORMAS =====
const heart = createHeartPoints();
const starShape = createStarShape();
const cake = createCakePoints();

createStars({ pts: heart });

// ===== ESTADO =====
let phase = "forming";
let textOpacity = 0;

// ===== DIBUJO =====
function drawStars() {
  stars.forEach(s => {

    if (phase === "explode") {
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.97;
      s.vy *= 0.97;
    } else {
      s.x += (s.tx - s.x) * 0.02;
      s.y += (s.ty - s.y) * 0.02;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });
}

// TEXTO
function drawText() {
  ctx.save();
  ctx.globalAlpha = textOpacity;
  ctx.textAlign = "center";
  ctx.fillStyle = "white";

  ctx.font = "bold 48px Arial";
  ctx.fillText("Feliz cumpleaños Nao! <3", window.innerWidth/2, window.innerHeight/2 + 200);

  ctx.font = "24px Arial";
  ctx.fillText("Te desean Donovan, Valeria y Derek :D", window.innerWidth/2, window.innerHeight/2 + 240);

  ctx.restore();
}

// LOOP
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  drawStars();

  if (phase === "text") {
    if (textOpacity < 1) textOpacity += 0.01;
    drawText();
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

// ⏱️ TIMELINE (ESTRELLA MÁS TIEMPO)
setTimeout(()=> phase="explode", 5000);

setTimeout(()=>{
  createStars({pts: starShape});
  phase="forming";
},8000);

// 🔥 MÁS TIEMPO AQUÍ (antes 11000)
setTimeout(()=> phase="explode", 13000);

setTimeout(()=>{
  createStars(cake);
  phase="forming";
},16000);

setTimeout(()=> phase="text", 20000);

animate();

window.addEventListener("resize", ()=>{
  resizeCanvas();
  createStars(cake);
});
</script>
</body>
</html>
