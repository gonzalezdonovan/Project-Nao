<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #020111, #000);
  font-family: Arial, sans-serif;
}
canvas { display: block; }

#mobileBlock {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 20px;
  z-index: 9999;
}
</style>
</head>

<body>

<div id="mobileBlock">
  Para desbloquear un regalo abre este enlace desde una computadora 💻
</div>

<canvas id="canvas"></canvas>

<script>
// 🚫 BLOQUEO MÓVIL
function isMobile() {
  return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (isMobile() || window.innerWidth < 768) {
  document.getElementById("mobileBlock").style.display = "flex";
  document.getElementById("canvas").style.display = "none";
  throw new Error("Bloqueado en móvil");
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();

// ===== FONDO =====
const bgStars = Array.from({ length: 150 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  size: Math.random() * 1.2,
  speed: Math.random() * 0.15 + 0.03
}));

function drawBackground() {
  bgStars.forEach(s => {
    s.y += s.speed;
    if (s.y > window.innerHeight) s.y = 0;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });
}

// ❤️ CORAZÓN
function createHeartPoints() {
  const pts = [];
  for (let t = 0; t < Math.PI * 2; t += 0.02) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    pts.push({ x: x * 0.7, y: y * 0.7 });
  }
  return pts;
}

// ⭐ ESTRELLA
function createStarShape() {
  const pts = [];
  const spikes = 5;
  const outer = 15;
  const inner = 7;

  let vertices = [];

  for (let i = 0; i < spikes * 2; i++) {
    let r = (i % 2 === 0) ? outer : inner;
    let angle = (i * Math.PI) / spikes;

    vertices.push({
      x: Math.cos(angle) * r,
      y: Math.sin(angle) * r
    });
  }

  for (let i = 0; i < vertices.length; i++) {
    let a = vertices[i];
    let b = vertices[(i + 1) % vertices.length];

    for (let t = 0; t < 1; t += 0.05) {
      pts.push({
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      });
    }
  }

  return pts;
}

// 🎂 PASTEL COMPLETO
function createCakePoints() {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  off.width = 900;
  off.height = 900;

  const cx = off.width / 2;
  const cy = off.height / 2;

  octx.fillStyle = "white";
  octx.strokeStyle = "white";
  octx.lineWidth = 6;

  octx.beginPath();
  octx.roundRect(cx - 140, cy + 20, 280, 120, 20);
  octx.fill();

  octx.beginPath();
  octx.roundRect(cx - 110, cy - 60, 220, 90, 20);
  octx.fill();

  for (let i = -100; i <= 100; i += 20) {
    octx.beginPath();
    octx.arc(cx + i, cy + 20, 10, 0, Math.PI);
    octx.fill();
  }

  // velas
  for (let i = -60; i <= 60; i += 60) {
    octx.fillRect(cx + i - 5, cy - 120, 10, 50);
    octx.beginPath();
    octx.ellipse(cx + i, cy - 135, 6, 10, 0, 0, Math.PI * 2);
    octx.fill();
  }

  // globos
  function drawBalloon(x, y) {
    octx.beginPath();
    octx.ellipse(x, y, 35, 45, 0, 0, Math.PI * 2);
    octx.fill();

    octx.beginPath();
    octx.moveTo(x - 5, y + 40);
    octx.lineTo(x + 5, y + 40);
    octx.lineTo(x, y + 50);
    octx.closePath();
    octx.fill();

    octx.beginPath();
    octx.moveTo(x, y + 50);
    octx.lineTo(x, y + 110);
    octx.stroke();
  }

  drawBalloon(cx - 260, cy - 120);
  drawBalloon(cx - 200, cy - 170);
  drawBalloon(cx + 260, cy - 120);
  drawBalloon(cx + 200, cy - 170);

  const img = octx.getImageData(0, 0, off.width, off.height);
  const pts = [];

  for (let y = 0; y < off.height; y += 2) {
    for (let x = 0; x < off.width; x += 2) {
      const i = (y * off.width + x) * 4;
      if (img.data[i + 3] > 120) pts.push({ x, y });
    }
  }

  return { pts, w: off.width, h: off.height };
}

// MAP
function map(p, shape) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  if (shape.w) {
    const scale = Math.min(window.innerWidth/shape.w, window.innerHeight/shape.h) * 0.75;
    return {
      x: (p.x - shape.w/2) * scale + cx,
      y: (p.y - shape.h/2) * scale + cy
    };
  } else {
    const scale = Math.min(window.innerWidth, window.innerHeight) * 0.03;
    return {
      x: p.x * scale + cx,
      y: -p.y * scale + cy
    };
  }
}

// PARTÍCULAS
let stars = [];

function createStars(shape) {
  stars = [];
  const pts = shape.pts || shape;

  for (let i = 0; i < pts.length; i += 2) {
    const m = map(pts[i], shape);

    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      tx: m.x,
      ty: m.y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      size: Math.random() * 1.5 + 0.5
    });
  }
}

// ===== ESTADO =====
let phase = "forming";
let textOpacity = 0;
let currentMessage = "";
let showMessage = false;
let textOffsetY = 180;

// TEXTO
function drawText() {
  if (!showMessage) return;

  ctx.save();
  ctx.globalAlpha = textOpacity;
  ctx.textAlign = "center";
  ctx.fillStyle = "white";

  const lines = currentMessage.split("\n");

  ctx.font = "24px Arial";

  lines.forEach((line, i) => {
    ctx.fillText(line, window.innerWidth/2, window.innerHeight/2 + textOffsetY + (i * 28));
  });

  ctx.restore();
}

function drawStars() {
  stars.forEach(s => {
    if (phase === "explode") {
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.97;
      s.vy *= 0.97;
    } else {
      s.x += (s.tx - s.x) * 0.02;
      s.y += (s.ty - s.y) * 0.02;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });
}

// LOOP
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  drawStars();

  if (showMessage) {
    if (textOpacity < 1) textOpacity += 0.01;
    drawText();
  } else {
    textOpacity = 0;
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}
animate();

// ===== FORMAS =====
const heart = createHeartPoints();
const starShape = createStarShape();
const cake = createCakePoints();

// ⭐ ESTRELLA (10s)
createStars({pts: starShape});
textOffsetY = 180;

setTimeout(()=>{
  showMessage = true;
  currentMessage = `Hola Nao aquí Donovan,
me entere que hoy es un día especial
y quería decirte unas cosas...`;
},1000);

setTimeout(()=>{
  phase="explode";
  showMessage = false;
},10000);

// ❤️ CORAZÓN (22s)
setTimeout(()=>{
  createStars({pts: heart});
  phase="forming";
  textOffsetY = 40;
},12000);

setTimeout(()=>{
  showMessage = true;
  currentMessage = `No tengo mucho que decir, lamentablemente pienso
que no eh tenido la oportunidad de llegar a conocerte del todo,
pero de lo poco que hemos hablado y las cosas que eh escuchado
sobre ti no me cabe duda de la gran persona que eres.

Una increíble prima para muchos, una gran amiga para todos
y una fuente de inspiración para otros.

Has logrado cosas increíbles y puedes seguir haciéndolo.
Cuídate mucho ojala poder saber de ti pronto y que podamos conocernos más,
espero poder vernos en otra ocasión y no te olvides de sonreír :D`;
},14000);

setTimeout(()=>{
  phase="explode";
  showMessage = false;
},34000);

// 🎂 FINAL
setTimeout(()=>{
  createStars(cake);
  phase="forming";
  textOffsetY = 180;
},36000);

setTimeout(()=>{
  showMessage = true;
  currentMessage = `Feliz cumpleaños Nao! <3
Te desean Donovan, Valeria y Derek :D`;
},39000);

window.addEventListener("resize", resizeCanvas);
</script>
</body>
</html>
